<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FTA Dashboard - Tổng quan chấm công nhận diện khuôn mặt">
    <title>Dashboard | FTA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar"></aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <button class="btn btn-ghost btn-icon" id="menuToggle" style="display:none;">☰</button>
                    <h1 class="page-title">Dashboard</h1>
                </div>
                <div class="top-bar-right">
                    <span class="top-bar-time" id="clock"></span>
                </div>
            </header>

            <div class="page-content">
                <!-- Stats Cards -->
                <div class="stats-grid mb-8" id="statsGrid">
                    <div class="stat-card accent">
                        <div class="stat-card-icon">👥</div>
                        <div class="stat-value" id="statTotal">-</div>
                        <div class="stat-label">Tổng nhân viên</div>
                    </div>
                    <div class="stat-card success">
                        <div class="stat-card-icon">✅</div>
                        <div class="stat-value" id="statCheckedIn">-</div>
                        <div class="stat-label">Đã check-in hôm nay</div>
                    </div>
                    <div class="stat-card warning">
                        <div class="stat-card-icon">⏰</div>
                        <div class="stat-value" id="statLate">-</div>
                        <div class="stat-label">Đi trễ</div>
                    </div>
                    <div class="stat-card danger">
                        <div class="stat-card-icon">❌</div>
                        <div class="stat-value" id="statAbsent">-</div>
                        <div class="stat-label">Vắng mặt</div>
                    </div>
                </div>

                <div class="grid-2">
                    <!-- Recent Activity -->
                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title">Hoạt động gần đây</h2>
                            <a href="/static/attendance.html" class="btn btn-ghost btn-sm">Xem tất cả →</a>
                        </div>
                        <div class="card-body" id="recentActivity">
                            <div class="loading-overlay">
                                <div class="spinner"></div>
                                <div class="loading-text">Đang tải...</div>
                            </div>
                        </div>
                    </div>

                    <!-- System Status -->
                    <div class="card">
                        <div class="card-header">
                            <h2 class="card-title">Trạng thái hệ thống</h2>
                        </div>
                        <div class="card-body" id="systemStatus">
                            <div class="loading-overlay">
                                <div class="spinner"></div>
                                <div class="loading-text">Đang tải...</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Today's Attendance Table -->
                <div class="card mt-6">
                    <div class="card-header">
                        <h2 class="card-title">Chấm công hôm nay</h2>
                        <a href="/static/live_monitor.html" class="btn btn-primary btn-sm">📹 Mở Camera</a>
                    </div>
                    <div class="card-body" style="padding: 0;">
                        <div class="table-container" id="todayTable">
                            <div class="loading-overlay">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        async function loadDashboard() {
            try {
                // Load stats
                const stats = await api.getDashboardStats();
                if (stats) {
                    document.getElementById('statTotal').textContent = stats.total_employees;
                    document.getElementById('statCheckedIn').textContent = stats.checked_in_today;
                    document.getElementById('statLate').textContent = stats.late_today;
                    document.getElementById('statAbsent').textContent = stats.absent_today;

                    // Recent activity
                    const activityEl = document.getElementById('recentActivity');
                    if (stats.recent_activities && stats.recent_activities.length > 0) {
                        activityEl.innerHTML = stats.recent_activities.map(a => `
                            <div class="activity-item">
                                <div class="activity-avatar">${getInitials(a.employee_name)}</div>
                                <div class="activity-info">
                                    <div class="activity-name">${a.employee_name}</div>
                                    <div class="activity-detail">${a.employee_code} · ${a.action}</div>
                                </div>
                                <div>
                                    ${statusBadge(a.status)}
                                </div>
                                <span class="activity-time">${a.time}</span>
                            </div>
                        `).join('');
                    } else {
                        activityEl.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">📋</div>
                                <div class="empty-state-title">Chưa có hoạt động</div>
                                <div class="empty-state-desc">Chưa có ai check-in hôm nay</div>
                            </div>
                        `;
                    }
                }
            } catch (e) {
                console.error('Dashboard load error:', e);
            }

            // Load system status
            try {
                const health = await api.getHealth();
                const statusEl = document.getElementById('systemStatus');
                const activeProvider = health.face_provider_active || 'Not initialized';
                const inferenceBadgeClass = health.face_using_gpu ? 'badge-success' : 'badge-warning';
                const inferenceLabel = health.face_using_gpu ? 'GPU CUDA' : 'CPU';
                statusEl.innerHTML = `
                    <div style="display: flex; flex-direction: column; gap: var(--space-4);">
                        <div class="flex items-center justify-between">
                            <span class="text-sm">AI Model</span>
                            <span class="badge ${health.face_model_loaded ? 'badge-success' : 'badge-danger'}">
                                ${health.face_model_loaded ? '🟢 Loaded' : '🔴 Not loaded'}
                            </span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-sm">Inference</span>
                            <span class="badge ${inferenceBadgeClass}">${inferenceLabel}</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-sm">Provider</span>
                            <span class="text-xs text-muted">${activeProvider}</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-sm">FAISS Index</span>
                            <span class="badge badge-info">${health.faiss_index_faces} faces</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-sm">Camera</span>
                            <span class="badge ${health.camera_connected ? 'badge-success' : 'badge-muted'}">
                                ${health.camera_connected ? '🟢 Connected' : '⚫ Disconnected'}
                            </span>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-sm">Version</span>
                            <span class="text-xs text-muted">${health.version}</span>
                        </div>
                    </div>
                `;
            } catch (e) {
                document.getElementById('systemStatus').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-title">Không thể kết nối server</div>
                    </div>
                `;
            }

            // Load today's attendance
            try {
                const today = await api.getTodayAttendance();
                const tableEl = document.getElementById('todayTable');

                if (today && today.length > 0) {
                    tableEl.innerHTML = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Mã NV</th>
                                    <th>Họ tên</th>
                                    <th>Phòng ban</th>
                                    <th>Check-in</th>
                                    <th>Check-out</th>
                                    <th>Trạng thái</th>
                                    <th>Nguồn</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${today.map(r => `
                                    <tr>
                                        <td><strong>${r.employee_code || ''}</strong></td>
                                        <td>${r.employee_name || ''}</td>
                                        <td class="text-muted">${r.department_name || '-'}</td>
                                        <td>${r.check_in_time ? formatTime(r.check_in_time) : '-'}</td>
                                        <td>${r.check_out_time ? formatTime(r.check_out_time) : '-'}</td>
                                        <td>${statusBadge(r.status)}</td>
                                        <td class="text-xs text-muted">${r.source === 'CAMERA_AUTO' ? '📹 Camera' : '✏️ Thủ công'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                } else {
                    tableEl.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            <div class="empty-state-title">Chưa có dữ liệu chấm công</div>
                            <div class="empty-state-desc">Mở camera để bắt đầu chấm công tự động</div>
                            <a href="/static/live_monitor.html" class="btn btn-primary">📹 Mở Camera</a>
                        </div>
                    `;
                }
            } catch (e) {
                console.error('Today attendance error:', e);
            }
        }

        loadDashboard();
        // Auto-refresh every 30 seconds
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
