<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FTA - Hệ thống chấm công nhận diện khuôn mặt">
    <title>Đăng nhập | FTA</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">👤</div>
                <h1 class="login-title">FTA</h1>
                <p class="login-subtitle">Face Time Attendance System</p>
            </div>
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Tên đăng nhập</label>
                    <input type="text" id="username" class="form-input" placeholder="Nhập tên đăng nhập" required autofocus>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Mật khẩu</label>
                    <input type="password" id="password" class="form-input" placeholder="Nhập mật khẩu" required>
                </div>
                <div id="loginError" style="color: var(--color-danger); font-size: var(--font-size-sm); margin-bottom: var(--space-4); display: none;"></div>
                <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
                    Đăng nhập
                </button>
            </form>
            <p style="text-align: center; margin-top: var(--space-6); font-size: var(--font-size-xs); color: var(--color-text-muted);">
                Mặc định: admin / admin123
            </p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Redirect if already logged in
        if (api.isAuthenticated()) {
            window.location.href = '/static/index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorEl = document.getElementById('loginError');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.textContent = 'Đang đăng nhập...';
            errorEl.style.display = 'none';

            try {
                await api.login(username, password);
                window.location.href = '/static/index.html';
            } catch (err) {
                errorEl.textContent = err.message || 'Đăng nhập thất bại';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Đăng nhập';
            }
        });
    </script>
</body>
</html>
