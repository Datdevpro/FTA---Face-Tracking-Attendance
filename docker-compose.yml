services:
  postgres:
    image: postgres:16-alpine
    container_name: fta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fta_db
      POSTGRES_USER: fta_user
      POSTGRES_PASSWORD: fta_password
    ports:
      - "5432:5432"
    volumes:
      - fta_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fta_user -d fta_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fta_postgres_data:
